name: Web Application Chrome Tests

on:
  workflow_dispatch:
    inputs:
      target_project:
        description: Target project label
        required: true
        default: Web Application
        type: choice
        options:
          - Web Application
          - Mobile Application
      browser:
        description: Playwright browser project
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - webkit

permissions:
  contents: read

jobs:
  web-app-chrome:
    runs-on: ubuntu-latest
    env:
      TARGET_PROJECT: ${{ github.event.inputs.target_project }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ github.event.inputs.browser }}

      - name: Validate required secrets
        env:
          ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
          ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}
        run: |
          if [ -z "$ASANA_EMAIL" ] || [ -z "$ASANA_PASSWORD" ]; then
            echo "Missing secrets. Add ASANA_EMAIL and ASANA_PASSWORD in GitHub repo secrets."
            exit 1
          fi

      - name: Inject credentials into runtime config
        env:
          ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
          ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}
        run: |
          node -e "const fs=require('fs'); const p='data/project-run-config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); cfg.credentials=cfg.credentials||{}; cfg.credentials.email=process.env.ASANA_EMAIL; cfg.credentials.password=process.env.ASANA_PASSWORD; fs.writeFileSync(p, JSON.stringify(cfg, null, 2));"

      - name: Run tests
        run: npm run test:allure -- --project=${{ github.event.inputs.browser }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-artifacts
          path: |
            allure-results/**
            allure-report/**
            playwright-report/**
            test-results/**
          if-no-files-found: warn
