jobs:
  web-app-chrome:
    runs-on: ubuntu-latest
    env:
      TARGET_PROJECT: ${{ github.event.inputs.target_project }}
      CI: true
      ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
      ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install --with-deps ${{ github.event.inputs.browser }}

      - name: Validate required secrets
        run: |
          set -e
          if [ -z "$ASANA_EMAIL" ] || [ -z "$ASANA_PASSWORD" ]; then
            echo "Missing secrets. Add ASANA_EMAIL and ASANA_PASSWORD in GitHub repo secrets."
            exit 1
          fi
          echo "Secrets validated ✅"

      - name: Inject credentials into runtime config
        run: |
          CONFIG_FILE="data/project-run-config.json"
          if [ ! -f "$CONFIG_FILE" ]; then echo "{}" > "$CONFIG_FILE"; fi
          node -e "
            const fs=require('fs');
            const cfg=JSON.parse(fs.readFileSync('$CONFIG_FILE','utf8'));
            cfg.credentials = cfg.credentials || {};
            cfg.credentials.email = process.env.ASANA_EMAIL;
            cfg.credentials.password = process.env.ASANA_PASSWORD;
            fs.writeFileSync('$CONFIG_FILE', JSON.stringify(cfg, null, 2));
          "

      - run: npm run test:allure -- --project=${{ github.event.inputs.browser }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-allure-artifacts
          path: |
            allure-results/**
            allure-report/**
            playwright-report/**
            test-results/**
          if-no-files-found: warn