name: Data-Driven Playwright Tests

on:
  workflow_dispatch:
    inputs:
      target_project:
        description: Target project label
        required: true
        default: Web Application and Mobile Application
        type: choice
        options:
          - Web Application and Mobile Application
          - Web Application
          - Mobile Application
      browser:
        description: Playwright browser project
        required: true
        default: all
        type: choice
        options:
          - all
          - chrome
          - firefox
          - webkit

permissions:
  contents: read

jobs:
  run-data-driven-tests:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout success
        run: echo "Checkout completed successfully."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Node.js success
        run: echo "Node.js setup completed successfully."

      - name: Install dependencies
        run: |
          npm ci
          echo "Dependency installation completed successfully."

      - name: Resolve runtime selections
        run: |
          TARGET_INPUT="${{ github.event.inputs.target_project }}"
          if [ "$TARGET_INPUT" = "Web Application and Mobile Application" ]; then
            echo "TARGET_PROJECT=all" >> "$GITHUB_ENV"
          else
            echo "TARGET_PROJECT=$TARGET_INPUT" >> "$GITHUB_ENV"
          fi
          echo "RUNTIME_BROWSER=${{ github.event.inputs.browser }}" >> "$GITHUB_ENV"
          echo "Runtime selection mapping completed successfully."

      - name: Install Playwright browser
        run: |
          INSTALL_BROWSER="$RUNTIME_BROWSER"

          if [ "$INSTALL_BROWSER" = "all" ]; then
            npx playwright install --with-deps chromium firefox webkit
          else
            if [ "$INSTALL_BROWSER" = "chrome" ]; then
              INSTALL_BROWSER="chromium"
            fi
            npx playwright install --with-deps "$INSTALL_BROWSER"
          fi

          echo "Playwright browser installation completed successfully."

      - name: Debug secret presence (safe)
        env:
          ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
          ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}
        run: |
          email_status="set"
          password_status="set"

          if [ -z "$ASANA_EMAIL" ]; then
            email_status="missing"
          fi

          if [ -z "$ASANA_PASSWORD" ]; then
            password_status="missing"
          fi

          echo "ASANA_EMAIL: $email_status"
          echo "ASANA_PASSWORD: $password_status"
          echo "Secret presence check completed successfully."

      - name: Validate required secrets
        env:
          ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
          ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}
        run: |
          if [ -z "$ASANA_EMAIL" ] || [ -z "$ASANA_PASSWORD" ]; then
            echo "Missing secrets. Add ASANA_EMAIL and ASANA_PASSWORD in GitHub repo secrets."
            exit 1
          fi
          echo "Secrets validation passed."

      - name: Inject credentials into runtime config
        env:
          ASANA_EMAIL: ${{ secrets.ASANA_EMAIL }}
          ASANA_PASSWORD: ${{ secrets.ASANA_PASSWORD }}
        run: |
          node -e "const fs=require('fs'); const p='data/project-run-config.json'; const cfg=JSON.parse(fs.readFileSync(p,'utf8')); cfg.credentials=cfg.credentials||{}; cfg.credentials.email=process.env.ASANA_EMAIL; cfg.credentials.password=process.env.ASANA_PASSWORD; fs.writeFileSync(p, JSON.stringify(cfg, null, 2));"
          echo "Credential injection completed successfully."

      - name: Run tests
        run: |
          if [ "$RUNTIME_BROWSER" = "all" ]; then
            npm run test:allure
          else
            npm run test:allure -- --project="$RUNTIME_BROWSER"
          fi
          echo "Test execution completed successfully."

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-artifacts
          path: |
            allure-results/**
            allure-report/**
            playwright-report/**
            test-results/**
          if-no-files-found: warn

      - name: Upload artifacts success
        if: always()
        run: echo "Artifact upload step completed successfully."
